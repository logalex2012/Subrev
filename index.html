<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon1ej.png" />
    <link rel="apple-touch-icon" href="/icon1ej.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" id="theme-color-meta" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SubreV" />
    <script>
      (function () {
        try {
          var k = 'heroui-theme';
          var t = localStorage.getItem(k);
          var d = document.documentElement;
          var dark = true;
          if (t === 'light') dark = false;
          else if (t === 'dark') dark = true;
          else if (t === 'system')
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          else if (!t) dark = true;
          d.classList.remove('light', 'dark');
          if (dark) {
            d.classList.add('dark');
            d.setAttribute('data-theme', 'dark');
          } else {
            d.classList.add('light');
            d.setAttribute('data-theme', 'light');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>SubreV</title>
  </head>
  <body class="font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
